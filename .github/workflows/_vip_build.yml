name: VIP Build (reusable)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      apk_url:
        required: false
        type: string
        default: ''
      repo_url:
        required: false
        type: string
        default: 'https://github.com/ACG-Q/apk-vip-builder'

permissions:
  contents: write

jobs:
  build-vip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Cache tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: tools
          key: tools-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: tools-

      - name: Download tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: python scripts/download_tools.py

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > keystore/release.keystore
          echo "${{ secrets.RELEASE_KEYSTORE_PASS }}" > .keystore_pass

      - name: Identify APK
        id: identify
        run: |
          python scripts/identify_apk.py --app ${{ inputs.app_name }} ${{ inputs.apk_url && format('--url "{0}"', inputs.apk_url) || '' }} && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: No update
        if: steps.identify.outputs.changed == 'false'
        run: echo "APK unchanged, skipping build"

      - name: Decompile APK
        if: steps.identify.outputs.changed == 'true'
        run: python scripts/decompile_apk.py --app ${{ inputs.app_name }}

      - name: Build VIP
        if: steps.identify.outputs.changed == 'true'
        run: python scripts/build_vip.py --app ${{ inputs.app_name }} --url "${{ inputs.repo_url }}"

      - name: Create Release
        if: steps.identify.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/create_release.py --app ${{ inputs.app_name }}

      - name: Commit state.json
        if: steps.identify.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/${{ inputs.app_name }}/state.json
          git commit -m "chore: update ${{ inputs.app_name }} state.json" || echo "Nothing to commit"
          git push
