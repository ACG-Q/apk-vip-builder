name: Daily VIP Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Cache tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: tools
          key: tools-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: tools-

      - name: Download tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          curl -L -o tools/apktool_2.11.0.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.11.0/apktool_2.11.0.jar

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > keystore/release.keystore
          echo "${{ secrets.RELEASE_KEYSTORE_PASS }}" > .keystore_pass

      - name: Identify APK
        id: identify
        run: |
          python scripts/identify_apk.py && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: No update
        if: steps.identify.outputs.changed == 'false'
        run: echo "APK unchanged, skipping build"

      - name: Decompile APK
        if: steps.identify.outputs.changed == 'true'
        run: python scripts/decompile_apk.py

      - name: Build VIP
        if: steps.identify.outputs.changed == 'true'
        run: python scripts/build_vip.py --url "${{ vars.REPO_URL || 'https://github.com/ACG-Q/apk-vip-builder' }}"

      - name: Read release info
        if: steps.identify.outputs.changed == 'true'
        id: release_info
        run: |
          echo "info=$(cat output/release_info.json | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.identify.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INFO=$(cat output/release_info.json)
          PKG=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['package'])")
          VER=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['version'])")
          VCODE=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['version_code'])")
          SHA=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['sha256'])")
          SIZE=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['size'])")
          TIME=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['build_time'])")
          APK_NAME=$(echo "$INFO" | python -c "import sys,json; print(json.load(sys.stdin)['apk_name'])")

          TAG="v${VCODE}"
          DTIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          TITLE="${PKG} ${VER} ${DTIME} Build"

          BODY=$(cat <<EOF
          ## ${TITLE}
          
          | 项目 | 值 |
          |------|-----|
          | 包名 | ${PKG} |
          | 版本 | ${VER} (${VCODE}) |
          | SHA256 | \`${SHA}\` |
          | 大小 | $((SIZE / 1024 / 1024)) MB |
          | 构建时间 | ${TIME} |
          EOF
          )

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            "output/${APK_NAME}#${APK_NAME}"
