<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK VIP Builder</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="header-decoration"></div>
    <h1>APK VIP Builder</h1>
    <p class="subtitle">上传 APK，自动触发 VIP 构建 <span id="version-badge" class="version-badge"></span></p>
    <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()" aria-label="切换主题">
      <svg id="theme-icon-system" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="theme-icon-light" viewBox="0 0 24 24" class="hidden"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="theme-icon-dark" viewBox="0 0 24 24" class="hidden"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <main>
    <section id="upload-section" class="card">
      <h2>上传 APK</h2>
      <div id="drop-zone" ondragover="event.preventDefault()" ondrop="handleDrop(event)" onclick="document.getElementById('file-input').click()">
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>拖拽 APK 或 XAPK 文件到此处，或点击选择文件</p>
        <input type="file" id="file-input" accept=".apk,.xapk" hidden onchange="handleFile(this.files[0])">
      </div>
      <div id="upload-progress" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <p id="progress-text">解析中...</p>
      </div>
    </section>

    <section id="metadata-section" class="card hidden">
      <h2>APK 信息</h2>
      <button class="btn-ghost" onclick="goToUpload()">← 重新上传</button>
      <div id="metadata">
        <div class="meta-row"><span class="meta-label">包名</span><span id="meta-package" class="meta-value code"></span></div>
        <div class="meta-row"><span class="meta-label">版本名</span><span id="meta-version-name" class="meta-value code"></span></div>
        <div class="meta-row"><span class="meta-label">版本号</span><span id="meta-version-code" class="meta-value code"></span></div>
        <div class="meta-row"><span class="meta-label">应用名称</span><span id="meta-label" class="meta-value"></span></div>
        <div class="meta-row"><span class="meta-label">文件大小</span><span id="meta-size" class="meta-value"></span></div>
        <div class="meta-row"><span class="meta-label">匹配应用</span><span id="meta-app" class="meta-value"></span></div>
      </div>
      <button id="submit-btn" class="btn-primary" onclick="createIssue()" disabled>创建构建请求</button>
    </section>

    <section id="result-section" class="card hidden">
      <div class="result-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="16 10 11 15 8 12"/></svg>
      </div>
      <h2 id="result-title">Issue 页面已打开</h2>
      <div id="result-body"></div>
      <button class="btn-ghost" onclick="goToUpload()" style="margin-top: 16px">← 重新上传</button>
    </section>

    <section id="stores-section" class="card">
      <h2>应用商店 <span class="hint" style="font-weight:400">点击直达该应用页面</span></h2>
      <div id="store-links" class="store-grid"></div>
    </section>
  </main>

  <footer id="footer"></footer>
</div>

<div id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="assets/axml.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
